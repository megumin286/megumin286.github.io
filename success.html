<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应征成功 - 超级地球</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial Black', Impact, sans-serif;
            background: linear-gradient(180deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(ellipse at 30% 20%, rgba(255, 193, 7, 0.1) 0%, transparent 50%),
                             radial-gradient(ellipse at 70% 80%, rgba(211, 47, 47, 0.08) 0%, transparent 50%);
            pointer-events: none;
        }

        .success-container {
            text-align: center;
            z-index: 1;
        }

        .success-icon {
            font-size: 8rem;
            animation: bounce 1s ease infinite;
            margin-bottom: 2rem;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .success-title {
            font-size: 4rem;
            color: #ffc107;
            text-shadow: 0 0 30px rgba(255, 193, 7, 0.8);
            letter-spacing: 8px;
            margin-bottom: 1rem;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px rgba(255, 193, 7, 0.8); }
            to { text-shadow: 0 0 40px rgba(255, 193, 7, 1); }
        }

        .success-subtitle {
            font-size: 1.5rem;
            color: #ffd54f;
            letter-spacing: 4px;
            margin-bottom: 3rem;
        }

        .success-message {
            font-size: 1.2rem;
            color: #ccc;
            line-height: 1.8;
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .flag-icon {
            font-size: 2rem;
            margin-right: 0.5rem;
        }

        .btn-back {
            background: linear-gradient(135deg, #ffc107 0%, #ff8f00 50%, #ffc107 100%);
            border: 3px solid #ffc107;
            padding: 1rem 3rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #000;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(255, 193, 7, 0.5);
        }

        .btn-back:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 143, 0, 0.7);
        }

        .footer {
            position: absolute;
            bottom: 2rem;
            text-align: center;
            color: #666;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .stars {
            position: absolute;
            top: 10%;
            left: 10%;
            font-size: 2rem;
            animation: twinkle 2s ease-in-out infinite;
        }

        .stars:nth-child(2) {
            top: 20%;
            right: 15%;
            animation-delay: 0.5s;
        }

        .stars:nth-child(3) {
            bottom: 30%;
            left: 20%;
            animation-delay: 1s;
        }

        .stars:nth-child(4) {
            bottom: 20%;
            right: 10%;
            animation-delay: 1.5s;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <span class="stars">⭐</span>
    <span class="stars">⭐</span>
    <span class="stars">⭐</span>
    <span class="stars">⭐</span>
    
    <div class="success-container">
        <div class="success-icon">🇺🇳</div>
        <h1 class="success-title">你太爱国了！</h1>
        <p class="success-subtitle">超级地球感谢您的奉献</p>
        
        <div class="success-message">
            <p><span class="flag-icon">🌍</span>您的应征申请已成功提交！</p>
            <p><span class="flag-icon">🎖️</span>您的爱国热情值得嘉奖！</p>
            <p><span class="flag-icon">⭐</span>我们将在48小时内与您联系安排入伍事宜</p>
            <p><span class="flag-icon">⚔️</span>准备好为民主而战吧，战士！</p>
        </div>
        
        <button class="btn-back" onclick="goBack()">返回主页</button>
    </div>
    
    <div class="footer">
        <p>© 2024 超级地球联邦 · 为民主而战</p>
    </div>

    <script>
        function goBack() {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
